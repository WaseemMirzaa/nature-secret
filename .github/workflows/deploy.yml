# Build and deploy to Hostinger VPS on push to main.
# Repo secrets: VPS_HOST, VPS_USERNAME, VPS_SSH_KEY, GH_TOKEN (PAT with repo + workflow scope).
# Server: clone repo to /var/www/nature-secret, add backend/.env, run seed:admin, start PM2 once.

name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            cd /var/www/nature-secret
            git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git" 2>/dev/null || true
            git pull origin main
            cd backend
            npm ci
            npm run build
            pm2 restart nature-api || (pm2 start dist/main.js --name nature-api && pm2 save)
            cd ..
            npm ci
            npm run build
            pm2 restart nature-web || (pm2 start npm --name nature-web -- start && pm2 save)
            pm2 save
